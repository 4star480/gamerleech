<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#060a06">
	<title>Checkout — Cryptocurrency Payment | GamerLeech</title>
	<meta name="description" content="Complete your purchase with cryptocurrency">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<link rel="stylesheet" href="legal.css">

	<script type="text/javascript">
		(function() {
			const ej = window.GL_CONFIG?.emailjs;
			if (typeof emailjs !== 'undefined' && ej?.publicKey) {
				try { emailjs.init(ej.publicKey); } catch (e) { console.error(e); }
			}
		})();
	</script>
	<style>
		.checkout-container {
			min-height: 100vh;
			padding: 120px 0 60px;
			background: radial-gradient(1200px 800px at 70% -10%, rgba(40,224,109,.06), transparent), var(--bg);
		}

		.checkout-grid {
			display: grid;
			grid-template-columns: 1fr 400px;
			gap: 40px;
			margin-top: 40px;
		}

		.payable-amount-card {
			position: sticky;
			top: 120px;
			height: fit-content;
		}

		.checkout-card {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 30px;
			box-shadow: var(--shadow);
		}

		.checkout-card h2 {
			margin-top: 0;
			margin-bottom: 20px;
			color: var(--text);
			font-size: 24px;
		}

		.order-item {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 15px 0;
			border-bottom: 1px solid var(--border);
		}

		.order-item:last-child {
			border-bottom: none;
		}

		.order-item-info h4 {
			margin: 0 0 5px 0;
			color: var(--text);
			font-size: 16px;
		}

		.order-item-info p {
			margin: 0;
			color: var(--muted);
			font-size: 14px;
		}

		.order-item-price {
			font-weight: 800;
			color: var(--green);
			font-size: 16px;
		}

		.order-total {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 20px 0;
			margin-top: 20px;
			border-top: 2px solid var(--green);
		}

		.order-total span {
			font-size: 18px;
			color: var(--muted);
		}

		.order-total strong {
			font-size: 28px;
			color: var(--green);
		}

		.payment-section {
			margin-bottom: 40px;
		}

		.payment-section-title {
			font-size: 18px;
			font-weight: 600;
			color: var(--text);
			margin-bottom: 20px;
		}

		.crypto-options {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
			gap: 12px;
			margin-bottom: 30px;
		}

		.crypto-option {
			background: var(--bg);
			border: 2px solid var(--border);
			border-radius: 8px;
			padding: 16px 12px;
			cursor: pointer;
			transition: all 0.3s ease;
			text-align: center;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100px;
		}

		.crypto-option:hover {
			border-color: var(--green);
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(40,224,109,.2);
		}

		.crypto-option.active {
			border-color: var(--green);
			background: rgba(40,224,109,.1);
			box-shadow: 0 4px 12px rgba(40,224,109,.3);
		}

		.crypto-option-icon {
			font-size: 28px;
			margin-bottom: 8px;
			line-height: 1;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.crypto-option-icon img {
			width: 48px;
			height: 48px;
			object-fit: contain;
		}

		.crypto-option-name {
			font-weight: 600;
			color: var(--text);
			font-size: 14px;
			margin-bottom: 4px;
		}

		.crypto-option-network {
			font-size: 11px;
			color: var(--muted);
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}

		.crypto-address {
			background: var(--bg);
			border: 2px solid var(--border);
			border-radius: 12px;
			padding: 20px;
			margin: 30px 0;
			display: none;
		}

		.crypto-address.active {
			display: block;
		}

		.crypto-address-label {
			font-size: 12px;
			color: var(--muted);
			margin-bottom: 10px;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.crypto-address-value {
			font-family: 'JetBrains Mono', monospace;
			font-size: 16px;
			color: var(--green);
			word-break: break-all;
			margin-bottom: 15px;
			line-height: 1.6;
		}

		.copy-btn {
			background: var(--green);
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 6px;
			cursor: pointer;
			font-weight: 600;
			transition: all 0.3s ease;
		}

		.copy-btn:hover {
			background: #2fc86f;
			transform: translateY(-1px);
		}

		.qr-code-container {
			margin-top: 20px;
			text-align: center;
			display: none;
		}

		.qr-code-container.active {
			display: block;
		}

		.qr-code-container img {
			max-width: 200px;
			border-radius: 8px;
		}

		.payment-status {
			background: rgba(40,224,109,.1);
			border: 2px solid var(--green);
			border-radius: 12px;
			padding: 20px;
			text-align: center;
			margin-top: 20px;
		}

		.status-icon {
			font-size: 32px;
			margin-bottom: 10px;
		}

		.status-message {
			font-weight: 600;
			color: var(--green);
			margin-bottom: 5px;
		}

		.status-note {
			font-size: 14px;
			color: var(--muted);
		}

		.payable-amount {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 30px;
			box-shadow: var(--shadow);
		}

		.payable-amount-label {
			font-size: 14px;
			color: var(--muted);
			margin-bottom: 10px;
			text-transform: uppercase;
			letter-spacing: 1px;
		}

		.payable-amount-value {
			font-size: 36px;
			font-weight: 800;
			color: var(--green);
			margin-bottom: 30px;
		}

		.terms-checkbox {
			display: flex;
			align-items: flex-start;
			gap: 10px;
			margin-bottom: 20px;
		}

		.terms-checkbox input {
			margin-top: 3px;
		}

		.terms-checkbox label {
			font-size: 14px;
			color: var(--muted);
			line-height: 1.5;
		}

		.terms-checkbox a {
			color: var(--green);
			text-decoration: underline;
		}

		#customer-email {
			width: 100%;
			padding: 12px;
			border: 1px solid var(--border);
			border-radius: 8px;
			background: var(--bg);
			color: var(--text);
			font-size: 14px;
			box-sizing: border-box;
			font-family: inherit;
			transition: border-color 0.3s ease;
		}

		#customer-email:focus {
			outline: none;
			border-color: var(--green);
		}

		#customer-email:invalid {
			border-color: rgba(255, 0, 0, 0.5);
		}

		.pay-now-btn {
			width: 100%;
			background: var(--green);
			color: white;
			border: none;
			padding: 16px;
			border-radius: 8px;
			font-size: 16px;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.pay-now-btn:hover:not(:disabled) {
			background: #2fc86f;
			transform: translateY(-2px);
			box-shadow: 0 4px 12px rgba(40,224,109,.3);
		}

		.pay-now-btn:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}

		.empty-cart {
			text-align: center;
			padding: 60px 20px;
		}

		.empty-cart h2 {
			margin-bottom: 10px;
		}

		@media (max-width: 768px) {
			.checkout-container { padding: 88px 0 100px; }
			.checkout-grid { grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
			.payable-amount-card { position: static; order: -1; }
			.checkout-card { padding: 20px 16px; border-radius: 14px; }
			.crypto-options { grid-template-columns: repeat(2, 1fr); gap: 10px; }
			.pay-now-btn { min-height: 48px; font-size: 1rem; }
			input, select, textarea { font-size: 16px; min-height: 44px; }
		}
	</style>
</head>

	<script src="site.js"></script>
	<script src="script.js"></script>
	<script>
		const EMAILJS_CONFIG = window.GL_CONFIG?.emailjs || {};
		// Crypto wallet addresses - DEFINED FIRST
		const CRYPTO_ADDRESSES = {
			'binance-pay': {
				name: 'Binance Pay',
				icon: '💳',
				logo: 'https://cryptologos.cc/logos/binance-coin-bnb-logo.png',
				address: 'bnb1qxy2kg9gj2gskp6e5m4kmq6g5g4n6g8k9x0z2p',
				barcode: null
			},
			'bitcoin': {
				name: 'Bitcoin',
				icon: '₿',
				logo: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png',
				address: '1LrtmepWxUKXbWVMcNBHXV8WXqt29aHUWv',
				barcode: 'Images/barcodes/BTC.jpg'
			},
			'crypto-com': {
				name: 'Crypto.com',
				icon: '🟣',
				logo: 'https://cryptologos.cc/logos/crypto-com-cro-logo.png',
				address: '0x742d35Cc6634C0532925a3b844Bc9e7595f0bEb',
				barcode: null
			},
			'ethereum': {
				name: 'Ethereum',
				icon: 'Ξ',
				logo: 'https://cryptologos.cc/logos/ethereum-eth-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/eth.jpg'
			},
			'usdt-eth': {
				name: 'Tether',
				network: 'USDT (ETH)',
				icon: '₮',
				logo: 'https://cryptologos.cc/logos/tether-usdt-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/eth.jpg'
			},
			'usdt-polygon': {
				name: 'Tether',
				network: 'USDT (Polygon)',
				icon: '₮',
				logo: 'https://cryptologos.cc/logos/tether-usdt-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/usdt polygon.jpg'
			},
			'usdt-trc20': {
				name: 'Tether',
				network: 'USDT (TRC20)',
				icon: '₮',
				logo: 'https://cryptologos.cc/logos/tether-usdt-logo.png',
				address: 'TCwDWG1sWdke4X7AyLAUKSQFA93Hcqzb5w',
				barcode: 'Images/barcodes/usdt trc20.jpg'
			},
			'usdc': {
				name: 'USD Coin',
				network: 'USDC',
				icon: '💵',
				logo: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/eth.jpg'
			},
			'usdc-arbitrum': {
				name: 'USD Coin',
				network: 'USDC (Arbitrum)',
				icon: '💵',
				logo: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/usdc arbitrum .jpg'
			},
			'usdc-polygon': {
				name: 'USD Coin',
				network: 'USDC (Polygon)',
				icon: '💵',
				logo: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png',
				address: '0xe26085227017e56647606c722cc4162d3926df83',
				barcode: 'Images/barcodes/Usdc polygon.jpg'
			},
			'usdc-solana': {
				name: 'USD Coin',
				network: 'USDC (Solana)',
				icon: '💵',
				logo: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png',
				address: '8TP6k4DHorT67LUSPrH7C34maPLzZN6MUuSdWGkW7iXc',
				barcode: 'Images/barcodes/usdc solana.jpg'
			}
		};
		
		// Load cart from localStorage
		let cart = [];
		try {
			const cartData = localStorage.getItem('gl_cart');
			cart = cartData ? JSON.parse(cartData) : [];
			if (!Array.isArray(cart)) cart = [];
		} catch (error) {
			console.error('Error loading cart:', error);
			cart = [];
		}

		let selectedCrypto = null;
		let currentTotal = 0;

		// Generate order ID
		function getOrderId() {
			let orderId = localStorage.getItem('gl_current_order_id');
			if (!orderId) {
				orderId = 'GL-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6).toUpperCase();
				localStorage.setItem('gl_current_order_id', orderId);
			}
			return orderId;
		}

		// Save order to history
		function saveOrder(orderId, cart, total, btcAmount, cryptoType, address) {
			try {
				const order = {
					id: orderId,
					date: new Date().toISOString(),
					items: cart,
					total: total,
					btcAmount: btcAmount,
					cryptoType: cryptoType,
					address: address,
					status: 'pending'
				};
				
				let orders = JSON.parse(localStorage.getItem('gl_orders') || '[]');
				orders = orders.filter(o => o.id !== orderId);
				orders.push(order);
				localStorage.setItem('gl_orders', JSON.stringify(orders));
			} catch (error) {
				console.error('Error saving order:', error);
			}
		}

		// Clear order ID after payment
		function clearOrderId() {
			localStorage.removeItem('gl_current_order_id');
		}

		// Render checkout - SIMPLIFIED AND RELIABLE
		function renderCheckout() {
			const content = document.getElementById('checkout-content');
			if (!content) {
				console.error('checkout-content not found');
				return;
			}

			// Calculate total
			currentTotal = cart.reduce((sum, item) => sum + (item.price || 0) * (item.qty || 1), 0);
			const orderId = getOrderId();
			
			// Crypto options
			const eWalletOptions = ['binance-pay', 'crypto-com'];
			const cryptoOptions = ['bitcoin', 'ethereum', 'usdt-eth', 'usdt-polygon', 'usdt-trc20', 'usdc', 'usdc-arbitrum', 'usdc-polygon', 'usdc-solana'];

			if (cart.length === 0) {
				// Empty cart - show payment methods anyway
				content.innerHTML = `
					<div class="checkout-grid">
						<div>
							<div class="checkout-card" style="margin-bottom: 30px;">
								<h2>Your cart is empty</h2>
								<p class="muted">Add some products to your cart to continue.</p>
								<a href="shop.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block;">Browse Shop</a>
							</div>
							<div class="checkout-card">
								<h2>Payment Methods</h2>
								<div class="payment-section">
									<div class="payment-section-title">E-Wallet</div>
									<div class="crypto-options">
										${eWalletOptions.map(id => {
											const crypto = CRYPTO_ADDRESSES[id];
											return `
												<div class="crypto-option" data-crypto="${id}" onclick="selectCrypto('${id}')">
													<div class="crypto-option-icon">${crypto.logo ? `<img src="${crypto.logo}" alt="${crypto.name}" onerror="this.onerror=null; this.parentElement.innerHTML='${crypto.icon}';">` : crypto.icon}</div>
													<div class="crypto-option-name">${crypto.name}</div>
												</div>
											`;
										}).join('')}
									</div>
								</div>
								<div class="payment-section">
									<div class="payment-section-title">Cryptocurrency</div>
									<div class="crypto-options">
										${cryptoOptions.map(id => {
											const crypto = CRYPTO_ADDRESSES[id];
											return `
												<div class="crypto-option" data-crypto="${id}" onclick="selectCrypto('${id}')">
													<div class="crypto-option-icon">${crypto.logo ? `<img src="${crypto.logo}" alt="${crypto.name}" onerror="this.onerror=null; this.parentElement.innerHTML='${crypto.icon}';">` : crypto.icon}</div>
													<div class="crypto-option-name">${crypto.name}</div>
													${crypto.network ? `<div class="crypto-option-network">${crypto.network}</div>` : ''}
												</div>
											`;
										}).join('')}
									</div>
								</div>
								${Object.keys(CRYPTO_ADDRESSES).map(id => {
									const crypto = CRYPTO_ADDRESSES[id];
									return `
										<div class="crypto-address" id="address-${id}">
											<div class="crypto-address-label">${crypto.name}${crypto.network ? ' (' + crypto.network + ')' : ''} Wallet Address</div>
											<div class="crypto-address-value" id="address-value-${id}">${crypto.address}</div>
											<button class="copy-btn" onclick="copyAddress('${id}')">
												<span id="copy-text-${id}">Copy Address</span>
											</button>
											${crypto.barcode ? `<div class="qr-code-container" id="qr-code-${id}"><img src="${crypto.barcode}" alt="${crypto.name} barcode" onerror="this.style.display='none'"></div>` : ''}
										</div>
									`;
								}).join('')}
							</div>
						</div>
					</div>
				`;
				return;
			}

			// Cart has items - show full checkout
			content.innerHTML = `
				<div class="checkout-grid">
					<div>
						<div class="checkout-card" style="margin-bottom: 30px;">
							<h2>Order Summary</h2>
							<div style="padding: 15px; background: rgba(40,224,109,.1); border-radius: 8px; margin-bottom: 20px; border-left: 3px solid var(--green);">
								<div style="font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;">Order ID</div>
								<div style="font-family: 'JetBrains Mono', monospace; font-size: 18px; color: var(--green); font-weight: 800;">${orderId}</div>
							</div>
							${cart.map(item => `
								<div class="order-item">
									<div class="order-item-info">
										<h4>${item.title}</h4>
										<p>Quantity: ${item.qty || 1}</p>
									</div>
									<div class="order-item-price">$${((item.price || 0) * (item.qty || 1)).toFixed(2)}</div>
								</div>
							`).join('')}
							<div class="order-total">
								<span>Total</span>
								<strong>$${currentTotal.toFixed(2)}</strong>
							</div>
						</div>

						<div class="checkout-card">
							<h2>Payment Method</h2>
							<div class="payment-section">
								<div class="payment-section-title">E-Wallet</div>
								<div class="crypto-options">
									${eWalletOptions.map(id => {
										const crypto = CRYPTO_ADDRESSES[id];
										return `
											<div class="crypto-option" data-crypto="${id}" onclick="selectCrypto('${id}')">
												<div class="crypto-option-icon">${crypto.logo ? `<img src="${crypto.logo}" alt="${crypto.name}" onerror="this.onerror=null; this.parentElement.innerHTML='${crypto.icon}';">` : crypto.icon}</div>
												<div class="crypto-option-name">${crypto.name}</div>
											</div>
										`;
									}).join('')}
								</div>
							</div>
							<div class="payment-section">
								<div class="payment-section-title">Cryptocurrency</div>
								<div class="crypto-options">
									${cryptoOptions.map(id => {
										const crypto = CRYPTO_ADDRESSES[id];
										return `
											<div class="crypto-option" data-crypto="${id}" onclick="selectCrypto('${id}')">
												<div class="crypto-option-icon">${crypto.logo ? `<img src="${crypto.logo}" alt="${crypto.name}" onerror="this.onerror=null; this.parentElement.innerHTML='${crypto.icon}';">` : crypto.icon}</div>
												<div class="crypto-option-name">${crypto.name}</div>
												${crypto.network ? `<div class="crypto-option-network">${crypto.network}</div>` : ''}
											</div>
										`;
									}).join('')}
								</div>
							</div>
							${Object.keys(CRYPTO_ADDRESSES).map(id => {
								const crypto = CRYPTO_ADDRESSES[id];
								return `
									<div class="crypto-address" id="address-${id}">
										<div class="crypto-address-label">${crypto.name}${crypto.network ? ' (' + crypto.network + ')' : ''} Wallet Address</div>
										<div class="crypto-address-value" id="address-value-${id}">${crypto.address}</div>
										<button class="copy-btn" onclick="copyAddress('${id}')">
											<span id="copy-text-${id}">Copy Address</span>
										</button>
										${crypto.barcode ? `<div class="qr-code-container" id="qr-code-${id}"><img src="${crypto.barcode}" alt="${crypto.name} barcode" onerror="this.style.display='none'"></div>` : ''}
									</div>
								`;
							}).join('')}
							<div class="payment-status" id="payment-status" style="display: none;">
								<div class="status-icon">⏳</div>
								<div class="status-message">Awaiting Payment</div>
								<div class="status-note" id="status-note"></div>
							</div>
						</div>
					</div>

					<div class="payable-amount-card">
						<div class="payable-amount">
							<div class="payable-amount-label">Payable Amount</div>
							<div class="payable-amount-value">$${currentTotal.toFixed(2)}</div>
							<div style="margin-bottom: 20px;">
								<label for="customer-email" style="display: block; font-size: 14px; color: var(--muted); margin-bottom: 8px; font-weight: 600;">Your Email Address</label>
								<input type="email" id="customer-email" placeholder="your.email@example.com" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; box-sizing: border-box;" onchange="updatePayButton()">
							</div>
							<div class="terms-checkbox">
								<input type="checkbox" id="terms-checkbox" onchange="updatePayButton()">
								<label for="terms-checkbox">By proceeding with this purchase, I accept GamerLeech's <a href="terms.html" target="_blank" rel="noopener">Terms of Service</a> and <a href="refund.html" target="_blank" rel="noopener">Refund Policy</a></label>
							</div>
							<button class="pay-now-btn" id="pay-now-btn" disabled onclick="processPayment()">PAY NOW</button>
						</div>
					</div>
				</div>
			`;
		}

		// Select crypto payment method
		function selectCrypto(cryptoId) {
			document.querySelectorAll('.crypto-option').forEach(opt => opt.classList.remove('active'));
			document.querySelectorAll('.crypto-address').forEach(addr => addr.classList.remove('active'));
			document.querySelectorAll('.qr-code-container').forEach(qr => qr.classList.remove('active'));
			
			const selectedOption = document.querySelector(`[data-crypto="${cryptoId}"]`);
			if (selectedOption) {
				selectedOption.classList.add('active');
			}
			
			const addressDiv = document.getElementById(`address-${cryptoId}`);
			const qrDiv = document.getElementById(`qr-code-${cryptoId}`);
			
			if (addressDiv) addressDiv.classList.add('active');
			if (qrDiv) qrDiv.classList.add('active');
			
			const statusDiv = document.getElementById('payment-status');
			const statusNote = document.getElementById('status-note');
			if (statusDiv && statusNote) {
				statusDiv.style.display = 'block';
				const crypto = CRYPTO_ADDRESSES[cryptoId];
				statusNote.textContent = `Send payment to the ${crypto.name}${crypto.network ? ' (' + crypto.network + ')' : ''} address above`;
			}
			
			selectedCrypto = cryptoId;
			updatePayButton();
		}

		// Copy address
		function copyAddress(cryptoId) {
			const address = CRYPTO_ADDRESSES[cryptoId].address;
			navigator.clipboard.writeText(address).then(() => {
				const copyText = document.getElementById(`copy-text-${cryptoId}`);
				if (copyText) {
					const original = copyText.textContent;
					copyText.textContent = 'Copied!';
					setTimeout(() => {
						copyText.textContent = original;
					}, 2000);
				}
			});
		}

		// Update pay button
		function updatePayButton() {
			const checkbox = document.getElementById('terms-checkbox');
			const emailInput = document.getElementById('customer-email');
			const payBtn = document.getElementById('pay-now-btn');
			if (checkbox && payBtn && emailInput) {
				const emailValid = emailInput.value && emailInput.value.includes('@') && emailInput.value.includes('.');
				payBtn.disabled = !(checkbox.checked && selectedCrypto && emailValid);
			}
		}

		// Process payment
		function processPayment() {
			if (!selectedCrypto) {
				alert('Please select a payment method');
				return;
			}
			
			const checkbox = document.getElementById('terms-checkbox');
			if (!checkbox || !checkbox.checked) {
				alert('Please accept the Terms of Service and Refund Policy');
				return;
			}
			
			const emailInput = document.getElementById('customer-email');
			const customerEmail = emailInput ? emailInput.value.trim() : '';
			
			if (!customerEmail || !customerEmail.includes('@') || !customerEmail.includes('.')) {
				alert('Please enter a valid email address');
				if (emailInput) emailInput.focus();
				return;
			}
			
			// Disable button to prevent double submission
			const payBtn = document.getElementById('pay-now-btn');
			if (payBtn) {
				payBtn.disabled = true;
				payBtn.textContent = 'Processing...';
			}
			
			// Save order with selected crypto
			const orderId = getOrderId();
			const crypto = CRYPTO_ADDRESSES[selectedCrypto];
			saveOrder(orderId, cart, currentTotal, null, selectedCrypto, crypto.address);
			
			// Prepare email data
			const businessEmail = 'gamerleech2@gmail.com';
			const cartItems = cart.map(item => `- ${item.title} (Qty: ${item.qty || 1}) - $${((item.price || 0) * (item.qty || 1)).toFixed(2)}`).join('\n');
			const paymentMethod = `${crypto.name}${crypto.network ? ' (' + crypto.network + ')' : ''}`;
			
			// Helper function to send email with timeout
			const sendEmailWithTimeout = (emailPromise, timeoutMs = 5000) => {
				return Promise.race([
					emailPromise,
					new Promise((resolve) => {
						setTimeout(() => {
							console.warn('Email sending timed out');
							resolve(false);
						}, timeoutMs);
					})
				]);
			};

			// Check if EmailJS is properly configured
			const isEmailJSConfigured = () => {
				const isConfigured = typeof emailjs !== 'undefined' && 
				       emailjs.send && 
				       EMAILJS_CONFIG.publicKey && 
				       EMAILJS_CONFIG.publicKey !== "YOUR_PUBLIC_KEY";
				
				if (!isConfigured) {
					console.warn('EmailJS check failed:', {
						emailjsExists: typeof emailjs !== 'undefined',
						emailjsSend: typeof emailjs !== 'undefined' && typeof emailjs.send === 'function',
						publicKey: EMAILJS_CONFIG.publicKey,
						publicKeyValid: EMAILJS_CONFIG.publicKey && EMAILJS_CONFIG.publicKey !== "YOUR_PUBLIC_KEY"
					});
				}
				
				return isConfigured;
			};

			// Ensure EmailJS is initialized
			const ensureEmailJSInitialized = () => {
				if (typeof emailjs !== 'undefined' && EMAILJS_CONFIG.publicKey && EMAILJS_CONFIG.publicKey !== "YOUR_PUBLIC_KEY") {
					try {
						emailjs.init(EMAILJS_CONFIG.publicKey);
						console.log('EmailJS re-initialized');
					} catch(e) {
						console.error('EmailJS re-initialization error:', e);
					}
				}
			};

			// Send email to business (order notification)
			const sendBusinessEmail = () => {
				if (!isEmailJSConfigured()) {
					console.warn('EmailJS not configured - skipping business email');
					return Promise.resolve(false);
				}

				ensureEmailJSInitialized();

				const templateParams = {
					to_email: businessEmail,
					reply_to: customerEmail || businessEmail,
					from_name: 'GamerLeech Website',
					from_email: customerEmail || businessEmail,
					order_id: orderId,
					total_amount: `$${currentTotal.toFixed(2)}`,
					payment_method: paymentMethod,
					wallet_address: crypto.address,
					cart_items: cartItems,
					customer_email: customerEmail || 'Not provided',
					message: `New Payment Request\n\nOrder ID: ${orderId}\nCustomer Email: ${customerEmail || 'Not provided'}\nTotal Amount: $${currentTotal.toFixed(2)}\nPayment Method: ${paymentMethod}\nWallet Address: ${crypto.address}\n\nItems:\n${cartItems}\n\nPlease process this payment request.`
				};
				
				console.log('Sending business email with params:', {
					serviceId: EMAILJS_CONFIG.serviceId,
					templateId: EMAILJS_CONFIG.templatePayment,
					to_email: businessEmail,
					businessEmailValid: businessEmail && businessEmail.includes('@') && businessEmail.includes('.')
				});
				
				try {
					const emailPromise = emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templatePayment, templateParams)
						.then((response) => {
							console.log('Business notification email sent!', response.status, response.text);
							return true;
						})
						.catch((error) => {
							console.error('EmailJS business email failed:', {
								error: error,
								text: error.text || 'No error text',
								status: error.status || 'No status',
								serviceId: EMAILJS_CONFIG.serviceId,
								templateId: EMAILJS_CONFIG.templatePayment
							});
							return false;
						});
					return sendEmailWithTimeout(emailPromise);
				} catch (error) {
					console.error('Error sending business email:', error);
					return Promise.resolve(false);
				}
			};
			
			// Send email to customer (order confirmation)
			const sendCustomerEmail = () => {
				if (!isEmailJSConfigured()) {
					console.warn('EmailJS not configured - skipping customer email');
					return Promise.resolve(false);
				}

				// Validate customer email
				if (!customerEmail || !customerEmail.includes('@') || !customerEmail.includes('.')) {
					console.warn('Invalid customer email, skipping customer email:', customerEmail);
					return Promise.resolve(false);
				}

				ensureEmailJSInitialized();

				const templateParams = {
					to_email: customerEmail,
					reply_to: customerEmail,
					from_name: 'GamerLeech',
					order_id: orderId,
					total_amount: `$${currentTotal.toFixed(2)}`,
					payment_method: paymentMethod,
					wallet_address: crypto.address,
					cart_items: cartItems,
					message: `Thank you for your order!\n\nOrder ID: ${orderId}\nTotal Amount: $${currentTotal.toFixed(2)}\nPayment Method: ${paymentMethod}\n\nPlease send payment to:\n${crypto.address}\n\nItems:\n${cartItems}\n\nWe will process your order once payment is confirmed.`
				};
				
				console.log('Sending customer email with params:', {
					serviceId: EMAILJS_CONFIG.serviceId,
					templateId: EMAILJS_CONFIG.templateConfirmation,
					to_email: customerEmail,
					customerEmailValid: customerEmail && customerEmail.includes('@') && customerEmail.includes('.')
				});
				
				try {
					const emailPromise = emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateConfirmation, templateParams)
						.then((response) => {
							console.log('Customer confirmation email sent!', response.status, response.text);
							return true;
						})
						.catch((error) => {
							console.error('EmailJS customer email failed:', {
								error: error,
								text: error.text || 'No error text',
								status: error.status || 'No status',
								serviceId: EMAILJS_CONFIG.serviceId,
								templateId: EMAILJS_CONFIG.templateConfirmation,
								customerEmail: customerEmail
							});
							return false;
						});
					return sendEmailWithTimeout(emailPromise);
				} catch (error) {
					console.error('Error sending customer email:', error);
					return Promise.resolve(false);
				}
			};
			
			// Send both emails with overall timeout
			const emailTimeout = setTimeout(() => {
				console.warn('Email process timed out, proceeding anyway');
				completePayment(false, false);
			}, 8000);

			const completePayment = (businessSent, customerSent) => {
				clearTimeout(emailTimeout);
				
				const emailConfigured = isEmailJSConfigured();
				let emailStatus = '';
				if (emailConfigured) {
					emailStatus = `${customerSent ? '✓ Order confirmation email sent to ' + customerEmail : '⚠ Customer email failed'}\n${businessSent ? '✓ Order notification sent to our team' : '⚠ Business notification failed'}`;
				} else {
					emailStatus = '⚠ Email service not configured - order recorded locally';
				}
				
				const successMessage = `Payment request submitted!\n\nOrder ID: ${orderId}\nAmount: $${currentTotal.toFixed(2)}\nPayment Method: ${paymentMethod}\n\nPlease send the payment to the address shown above.\n\n${emailStatus}\n✓ Your order has been recorded`;
				
				alert(successMessage);
				
				// Clear cart and redirect
				localStorage.removeItem('gl_cart');
				clearOrderId();
				setTimeout(() => {
					globalThis.location.href = 'shop.html';
				}, 2000);
			};

			// Try to send emails, but don't wait forever
			Promise.all([sendBusinessEmail(), sendCustomerEmail()])
				.then(([businessSent, customerSent]) => {
					completePayment(businessSent, customerSent);
				})
				.catch((error) => {
					console.error('Error processing payment:', error);
					completePayment(false, false);
				});
		}

		// Initialize when page loads
		document.addEventListener('DOMContentLoaded', function() {
			renderCheckout();
		});

		// Also try immediately in case DOM is already loaded
		if (document.readyState === 'complete' || document.readyState === 'interactive') {
			setTimeout(renderCheckout, 100);
		}
	</script>
</body>
</html>
