<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>Orders — GamerLeech</title>
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="synapse-ui.css?v=10">
	<link rel="icon" href="assets/logo.svg">
	<script src="config.js"></script>
</head>
<body class="has-synapse-tabbar">
	<header class="synapse-header safe-top">
		<div class="synapse-header-inner">
			<a href="index.html" class="synapse-brand">
				<img src="assets/logo.svg" alt="" class="synapse-brand-logo" width="36" height="36">
				<span class="synapse-brand-text"><span class="synapse-brand-name">GamerLeech</span><span class="synapse-brand-tag">Orders</span></span>
			</a>
		</div>
	</header>
	<main class="synapse-page">
		<div class="synapse-section">
			<h1 style="margin:0 0 8px;font-size:1.75rem;font-weight:800">Your orders</h1>
			<p style="color:var(--syn-muted);font-size:14px;margin:0 0 24px">Cheats orders placed via crypto checkout on this device.</p>
			<div id="orders-list"></div>
			<p style="margin-top:32px;color:var(--syn-muted);font-size:13px">Marketplace purchases — email <a href="mailto:gamerleech2@gmail.com">gamerleech2@gmail.com</a> with your listing ID.</p>
		</div>
	</main>
	<nav class="synapse-tabbar safe-bottom">
		<div class="synapse-tabbar-inner">
			<a href="index.html"><span class="synapse-tabbar-icon">⌂</span>Home</a>
			<a href="shop.html"><span class="synapse-tabbar-icon">⚡</span>Cheats</a>
			<a href="browse.html"><span class="synapse-tabbar-icon">◎</span>Browse</a>
			<a href="games.html"><span class="synapse-tabbar-icon">▦</span>Games</a>
			<a href="wishlist.html"><span class="synapse-tabbar-icon">♥</span>Saved</a>
		</div>
	</nav>
	<script src="body-scroll-lock.js"></script>
	<script src="mobile-menu.js?v=4"></script>
	<script src="chrome.js?v=10"></script>
	<script src="site.js"></script>
	<script>
		GL_CHROME?.initMobileTabbar?.();
		GL_CHROME?.injectSynapseChrome?.();
		const el = document.getElementById('orders-list');
		let orders = [];
		try { orders = JSON.parse(localStorage.getItem('gl_orders') || '[]'); } catch (_) {}
		if (!orders.length) {
			el.innerHTML = '<p class="synapse-empty">No orders yet. <a href="shop.html" class="synapse-link">Browse cheats</a></p>';
		} else {
			el.innerHTML = orders.slice().reverse().map((o) => `
				<article class="synapse-checkout-card" style="margin-bottom:12px">
					<div class="synapse-checkout-order-id"><span>Order ID</span><strong>${o.id}</strong></div>
					<p style="margin:0 0 8px;font-size:14px"><strong>$${Number(o.total).toFixed(2)}</strong> · ${o.status || 'pending'}</p>
					<p style="margin:0;font-size:12px;color:var(--syn-muted)">${new Date(o.date).toLocaleString()} · ${o.customerEmail || ''}</p>
				</article>`).join('');
		}
	</script>
</body>
</html>
