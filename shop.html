<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#07060e">
	<title>GamerLeech Cheats — Premium Gaming Tools</title>
	<meta name="description" content="Browse premium gaming cheats for Call of Duty, Valorant, Fortnite, FiveM, Roblox, and more.">
	<link rel="canonical" href="https://gamerleech.netlify.app/shop.html">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="synapse-ui.css?v=11">
	<link rel="stylesheet" href="cart-ui.css?v=5">
	<link rel="icon" href="assets/logo.svg">
	<script src="config.js"></script>
</head>
<body class="has-synapse-tabbar shop-page">
	<div id="live-ticker" class="live-ticker"></div>

	<header class="synapse-header safe-top">
		<div class="synapse-header-inner">
			<a href="index.html" class="synapse-brand">
				<img src="assets/logo.svg" alt="" class="synapse-brand-logo" width="36" height="36">
				<span class="synapse-brand-text">
					<span class="synapse-brand-name">GamerLeech</span>
					<span class="synapse-brand-tag">Cheats</span>
				</span>
			</a>
			<div class="synapse-search-wrap">
				<form class="synapse-search-glow" data-synapse-search>
					<div class="synapse-search-inner">
						<span aria-hidden="true">🔍</span>
						<input type="search" name="q" id="header-search" placeholder="Search cheats…" aria-label="Search shop">
					</div>
				</form>
			</div>
			<nav class="synapse-nav">
				<a href="shop.html" class="active">Cheats</a>
				<a href="browse.html">Marketplace</a>
				<a href="games.html">All games</a>
				<a href="sell.html">Sell</a>
			</nav>
			<div class="synapse-header-actions">
				<a href="wishlist.html" title="Wishlist">♥</a>
				<button type="button" class="synapse-cart-btn" id="cart-button" aria-label="Open cart">🛒 <span class="cart-count" id="cart-count">0</span></button>
			</div>
		</div>
	</header>

	<main class="synapse-page">
		<div class="synapse-browse-hero">
			<div class="synapse-section">
				<nav class="synapse-breadcrumb" aria-label="Breadcrumb">
					<a href="index.html" class="synapse-link">Home</a>
					<span aria-hidden="true">/</span>
					<span id="breadcrumb-current">Cheats</span>
				</nav>
				<h1 id="page-title" class="synapse-browse-title">Browse <span class="synapse-hero-gradient">cheats</span></h1>
				<p id="page-subtitle" class="synapse-browse-sub"></p>
				<div class="synapse-search-glow synapse-shop-search-mobile">
					<div class="synapse-search-inner">
						<span aria-hidden="true">🔍</span>
						<input type="search" id="search-input" placeholder="Search cheats…" aria-label="Search cheats">
					</div>
				</div>
			</div>
		</div>

		<div class="synapse-section">
			<nav id="category-tabs" class="synapse-tabs scroll-touch" aria-label="Site sections"></nav>
			<nav class="synapse-catalog-tabs" id="catalog-tabs" aria-label="Shop catalog"></nav>
			<div id="shop-filters" class="synapse-filters scroll-touch"></div>
			<div id="shop-sort" class="synapse-filters scroll-touch" style="margin-top:0"></div>
			<div id="tier-chips" class="synapse-filters synapse-tier-filters scroll-touch" aria-label="Product type filters"></div>
			<div id="product-grid" class="synapse-listings-grid" style="margin-top:24px"></div>
			<div class="synapse-cta" style="margin-top:48px">
				<h2>Need accounts or currency?</h2>
				<p>Browse 3,200+ player-to-player marketplace offers.</p>
				<a href="browse.html" class="synapse-btn-primary">Open marketplace</a>
			</div>
		</div>
	</main>

	<aside class="cart-drawer" id="cart-drawer" role="dialog" aria-modal="true" aria-labelledby="cart-drawer-title" aria-hidden="true">
		<div class="cart-header">
			<h2 id="cart-drawer-title">Your Cart</h2>
			<button class="icon-btn touch-target" id="cart-close" aria-label="Close cart">✕</button>
		</div>
		<div class="cart-scroll"><div class="cart-items" id="cart-items"></div></div>
		<div class="cart-footer">
			<p class="cart-total">Total: <strong id="cart-total">$0</strong></p>
			<button type="button" class="btn btn-primary cart-checkout-btn touch-target" id="checkout-btn">Proceed to Checkout</button>
		</div>
	</aside>
	<div class="cart-backdrop" id="cart-backdrop" hidden></div>
	<div class="cart-toast" id="cart-toast" role="status" aria-live="polite"></div>

	<footer class="synapse-footer safe-bottom">
		<div class="synapse-footer-inner">
			<div class="synapse-footer-bottom" style="border:0;margin:0;padding:24px 0">
				<p>© <span id="year"></span> GamerLeech</p>
				<a href="checkout.html" class="synapse-link">Checkout</a>
			</div>
		</div>
	</footer>

	<nav class="synapse-tabbar safe-bottom" aria-label="Mobile navigation">
		<div class="synapse-tabbar-inner">
			<a href="index.html"><span class="synapse-tabbar-icon">⌂</span>Home</a>
			<a href="shop.html"><span class="synapse-tabbar-icon">⚡</span>Cheats</a>
			<a href="browse.html"><span class="synapse-tabbar-icon">◎</span>Browse</a>
			<a href="games.html"><span class="synapse-tabbar-icon">▦</span>Games</a>
			<a href="wishlist.html"><span class="synapse-tabbar-icon">♥</span>Saved</a>
		</div>
	</nav>

	<div class="cart-pay-bar mobile-above-tab-bar" id="cart-pay-bar" hidden>
		<button type="button" class="btn btn-primary touch-target" id="checkout-btn-fixed">Proceed to Checkout</button>
	</div>

	<script src="body-scroll-lock.js"></script>
	<script src="cart.js"></script>
	<script src="shop-images.js?v=11"></script>
	<script src="mobile-menu.js?v=5"></script>
	<script src="chrome.js?v=11"></script>
	<script src="search-suggest.js?v=2"></script>
	<script src="site.js"></script>
	<script src="shop-app.js?v=11"></script>
	<script>
		document.getElementById('year').textContent = new Date().getFullYear();
		GL_CHROME?.initMobileTabbar?.();
		GL_CHROME?.initSearch?.();
		GL_CHROME?.renderCategoryTabs?.('cheats');
		GL_CHROME?.loadMarketplace().then(d => d && GL_CHROME.renderTicker(d.ticker));
	</script>
</body>
</html>
